<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop Online</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
  body{background:#0f172a;color:#f8fafc;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
.box{width:100%;max-width:600px;background:rgba(255,255,255,0.08);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:20px}
  h1{font-size:22px;text-align:center;margin-bottom:12px}
  input,button{width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;margin-top:10px}
  input{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2)}
  button{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white;font-weight:700;cursor:pointer}
  button:disabled{opacity:0.5;cursor:not-allowed}
.hidden{display:none}
.players{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.player{background:rgba(255,255,255,0.1);padding:8px 12px;border-radius:12px;font-size:13px}
.player.you{border:1px solid #8b5cf6}
.timer{font-size:32px;font-weight:700;text-align:center;color:#fbbf24;margin:12px 0}
.letter{font-size:48px;font-weight:800;text-align:center;color:#22d3ee;margin:8px 0}
.cats{display:grid;gap:10px;margin-top:16px}
.cat{display:flex;gap:8px;align-items:center}
.cat label{width:90px;font-size:13px;color:#cbd5e1}
.cat input{flex:1;margin:0}
.log{background:rgba(0,0,0,0.3);padding:12px;border-radius:12px;max-height:200px;overflow:auto;font-size:13px;margin-top:12px}
.scoreboard{background:rgba(0,0,0,0.2);padding:12px;border-radius:12px;margin-top:12px}
.score-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
</style>
</head>
<body>
<div class="box">
  <h1>🔤 Stop Online</h1>

  <div id="lobby">
    <input type="text" id="nome" placeholder="Seu nome" maxlength="12">
    <input type="text" id="sala" placeholder="Código da sala" maxlength="6">
    <button onclick="entrarSala()">Entrar/Criar Sala</button>
  </div>

  <div id="game" class="hidden">
    <div class="players" id="players"></div>
    <div id="status">Aguardando jogadores...</div>

    <div id="preGame" class="hidden">
      <button onclick="iniciarRodada()">🚀 Começar Rodada</button>
    </div>

    <div id="playArea" class="hidden">
      <div class="timer" id="timer">10:00</div>
      <div class="letter" id="letra">A</div>
      <div class="cats" id="cats"></div>
      <button onclick="pararJogo()">🛑 STOP!</button>
    </div>

    <div id="conferencia" class="hidden">
      <h3>Conferência - Marca o que está errado</h3>
      <div id="listaRespostas"></div>
      <button onclick="finalizarRodada()">✅ Confirmar Pontos</button>
    </div>

    <div class="scoreboard" id="scoreboard"></div>
    <div class="log" id="log"></div>
    <button onclick="sairSala()" style="background:#ef4444;margin-top:12px">Sair da Sala</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getDatabase, ref, set, onValue, remove, update, get } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';

// SUAS CREDENCIAIS AQUI
const firebaseConfig = {
  apiKey: "AIzaSyByHwg1w_8SEfFj2rTJA_drFSmWys0aq08",
  authDomain: "adedonha123-f4f2d.firebaseapp.com",
  databaseURL: "https://adedonha123-f4f2d-default-rtdb.firebaseio.com",
  projectId: "adedonha123-f4f2d",
  storageBucket: "adedonha123-f4f2d.appspot.com",
  messagingSenderId: "540186753462",
  appId: "1:540186753462:web:86d4ad28327e92abf5a917"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CATEGORIAS = ['Nome', 'Objeto', 'Cor', 'Legumes', 'Filmes', 'Cidade', 'País'];
let salaAtual = null;
let meuId = 'p_' + Math.random().toString(36).slice(2,8);
let meuNome = '';
let timerInterval = null;

window.entrarSala = function() {
  meuNome = document.getElementById('nome').value.trim();
  salaAtual = document.getElementById('sala').value.trim().toUpperCase();
  if(!meuNome ||!salaAtual) return alert('Preenche nome e código da sala');

  const playerRef = ref(db, `stop/${salaAtual}/players/${meuId}`);
  set(playerRef, {nome: meuNome, score: 0});

  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  log(`Você entrou na sala ${salaAtual}`);
  escutarSala();
  window.onbeforeunload = () => remove(playerRef);
}

function escutarSala() {
  const salaRef = ref(db, `stop/${salaAtual}`);
  onValue(salaRef, (snap) => {
    const data = snap.val();
    if(!data) return;

    const players = data.players || {};
    const playerCount = Object.keys(players).length;

    document.getElementById('players').innerHTML = Object.entries(players)
   .map(([id,p]) => `<div class="player ${id===meuId?'you':''}">${p.nome} - ${p.score||0}pts</div>`)
   .join('');

    if(playerCount >= 2 &&!data.rodada) {
      if(Object.keys(players)[0] === meuId) {
        document.getElementById('preGame').classList.remove('hidden');
      }
      document.getElementById('status').textContent = 'Pronto pra começar';
    }

    if(data.rodada) {
      atualizarRodada(data.rodada);
    }

    atualizarScoreboard(players);
  });
}

window.iniciarRodada = function() {
  const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const letra = letras[Math.floor(Math.random() * letras.length)];

  const rodada = {
    letra: letra,
    status: 'jogando',
    inicio: Date.now(),
    duracao: 600000,
    respostas: {},
    parouPor: null
  };

  set(ref(db, `stop/${salaAtual}/rodada`), rodada);
}

function atualizarRodada(rodada) {
  const agora = Date.now();
  const tempoRestante = Math.max(0, rodada.duracao - (agora - rodada.inicio));

  if(rodada.status === 'jogando') {
    document.getElementById('playArea').classList.remove('hidden');
    document.getElementById('preGame').classList.add('hidden');
    document.getElementById('letra').textContent = rodada.letra;

    if(!document.getElementById('cats').innerHTML) {
      document.getElementById('cats').innerHTML = CATEGORIAS.map(cat =>
        `<div class="cat"><label>${cat}:</label><input id="cat_${cat}" placeholder="${rodada.letra}..."></div>`
      ).join('');
    }

    const min = Math.floor(tempoRestante/60000);
    const seg = Math.floor((tempoRestante%60000)/1000);
    document.getElementById('timer').textContent = `${min}:${seg.toString().padStart(2,'0')}`;

    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const agora2 = Date.now();
      const t = Math.max(0, rodada.duracao - (agora2 - rodada.inicio));
      const min2 = Math.floor(t/60000);
      const seg2 = Math.floor((t%60000)/1000);
      document.getElementById('timer').textContent = `${min2}:${seg2.toString().padStart(2,'0')}`;
      if(t <= 0) finalizarTempo();
    }, 1000);
  }

  if(rodada.status === 'conferencia') {
    clearInterval(timerInterval);
    document.getElementById('playArea').classList.add('hidden');
    document.getElementById('conferencia').classList.remove('hidden');
    montarConferencia(rodada);
  }
}

window.pararJogo = function() {
  update(ref(db, `stop/${salaAtual}/rodada`), {
    status: 'conferencia',
    parouPor: meuId
  });
  salvarRespostas();
}

function finalizarTempo() {
  clearInterval(timerInterval);
  update(ref(db, `stop/${salaAtual}/rodada`), {
    status: 'conferencia'
  });
  salvarRespostas();
}

function salvarRespostas() {
  const respostas = {};
  CATEGORIAS.forEach(cat => {
    const val = document.getElementById(`cat_${cat}`)?.value.trim() || '';
    respostas[cat] = val;
  });
  set(ref(db, `stop/${salaAtual}/rodada/respostas/${meuId}`), respostas);
}

let playersCache = {};
function montarConferencia(rodada) {
  const container = document.getElementById('listaRespostas');
  let html = '';

  CATEGORIAS.forEach(cat => {
    html += `<h4>${cat}</h4>`;
    Object.entries(rodada.respostas || {}).forEach(([pid, resp]) => {
      const palavra = resp[cat] || '-';
      const nome = playersCache[pid]?.nome || pid;
      html += `<div style="margin:6px 0">
        <input type="checkbox" id="chk_${pid}_${cat}" checked>
        <label for="chk_${pid}_${cat}">${nome}: ${palavra}</label>
      </div>`;
    });
  });

  container.innerHTML = html;
}

window.finalizarRodada = function() {
  const rodadaRef = ref(db, `stop/${salaAtual}/rodada`);
  get(rodadaRef).then(snap => {
    const rodada = snap.val();
    const pontos = calcularPontos(rodada);

    Object.entries(pontos).forEach(([pid, pts]) => {
      const scoreRef = ref(db, `stop/${salaAtual}/players/${pid}/score`);
      get(scoreRef).then(s => {
        const atual = s.val() || 0;
        set(scoreRef, atual + pts);
      });
    });

    log('Rodada finalizada! Nova rodada em 5s...');
    setTimeout(() => {
      remove(rodadaRef);
      document.getElementById('conferencia').classList.add('hidden');
      document.getElementById('playArea').classList.add('hidden');
      document.getElementById('cats').innerHTML = '';
    }, 5000);
  });
}

function calcularPontos(rodada) {
  const pontos = {};
  const respostas = rodada.respostas || {};
  const letra = rodada.letra.toLowerCase();

  CATEGORIAS.forEach(cat => {
    const palavras = {};

    Object.entries(respostas).forEach(([pid, resp]) => {
      let palavra = (resp[cat] || '').toLowerCase();
      palavra = removerAcento(palavra).trim();

      if(!palavra ||!palavra.startsWith(letra)) {
        palavras[pid] = {pts: 0};
        return;
      }

      let repeticoes = 0;
      Object.values(respostas).forEach(r => {
        if(removerAcento(r[cat]||'').toLowerCase().trim() === palavra) repeticoes++;
      });

      palavras[pid] = {pts: repeticoes === 1? 10 : 5};
    });

    Object.entries(palavras).forEach(([pid, p]) => {
      pontos[pid] = (pontos[pid] || 0) + p.pts;
    });
  });

  return pontos;
}

function removerAcento(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function atualizarScoreboard(players) {
  playersCache = players;
  const sorted = Object.entries(players).sort((a,b) => (b[1].score||0) - (a[1].score||0));
  document.getElementById('scoreboard').innerHTML = '<h4>Placar</h4>' +
    sorted.map(([id,p]) => `<div class="score-row"><span>${p.nome}</span><span>${p.score||0} pts</span></div>`).join('');
}

function log(msg) {
  document.getElementById('log').innerHTML += msg + '<br>';
  document.getElementById('log').scrollTop = 9999;
}

window.sairSala = function() {
  if(salaAtual) remove(ref(db, `stop/${salaAtual}/players/${meuId}`));
  location.reload();
}
</script>
</body>
</html>
